<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="dashboard.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deprompt | Dashboard</title>
    <link rel="icon" href="../assets/icon48.png" />
  </head>
  <body>
    <header id="header" class="card">
      <div id="header-left">
        <img src="../assets/icon128.png" class="logo-img" alt="deprompt" />
      </div>

      <div id="radio-area">
        <label class="radio-label"
          ><input type="radio" name="viewType" value="weekly" checked /><span>Weekly</span></label
        >
        <label class="radio-label"><input type="radio" name="viewType" value="monthly" /><span>Monthly</span></label>
        <label class="radio-label"><input type="radio" name="viewType" value="yearly" /><span>Yearly</span></label>
        <label class="radio-label"><input type="radio" name="viewType" value="alltime" /><span>All Time</span></label>
      </div>

      <a href="options.html" class="settingsField">
        <img src="../assets/settings.png" class="settingsIcon" />
        <span class="settingsText">Settings</span>
      </a>
    </header>

    <main>
      <!-- Primary stat cards -->
      <section id="stats-grid">
        <div class="stat-card highlight">
          <div class="stat-label">Today</div>
          <div class="stat-value" id="today-usage">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" id="period-label">This Week</div>
          <div class="stat-value" id="period-usage">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" id="top-ai-label">Top AI This Week</div>
          <div class="stat-value" id="top-ai-today">—</div>
          <div class="stat-sub" id="top-ai-today-time"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">All Time</div>
          <div class="stat-value" id="alltime-usage">—</div>
        </div>
      </section>

      <!-- Charts -->
      <section id="breakdown-section" class="card">
        <div id="chart-left">
          <div class="section-label">Usage Breakdown</div>
          <div id="barChart" class="chart"></div>
        </div>
        <div id="chart-right">
          <div class="section-label">Provider Distribution</div>
          <div id="pieChart" class="chart"></div>
        </div>
      </section>

      <!-- Secondary stats + quick actions -->
      <section id="secondary-row" class="card">
        <div class="secondary-stat">
          <span class="secondary-label">Active Days (this week)</span>
          <span class="secondary-value" id="active-days">—</span>
        </div>
        <div class="row-divider"></div>
        <div class="secondary-stat">
          <span class="secondary-label">Last Week</span>
          <span class="secondary-value" id="last-week-usage">—</span>
        </div>
        <div class="row-divider"></div>
        <div class="secondary-stat actions-stat">
          <span class="secondary-label">Quick Actions</span>
          <div id="button-group">
            <button id="dashboard-block" class="button primary">Block</button>
            <button
              id="dashboard-snooze-block"
              class="button primary"
              title="Temporarily lift an active block for 5 minutes"
              disabled
            >
              Snooze block
            </button>
            <button id="dashboard-toggle" class="button primary" title="Disable all blockers for the rest of today">
              Toggle
            </button>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-links">
      <a href="https://github.com/timknappe/deprompt">Contribute on Github</a>
      <a href="https://timknappe.dev/archive/societal-impact-cognitive-offloading/">Why this is important</a>
    </div>
    <script type="module" src="dashboard.js"></script>
  </body>
</html>
